services:
  mysql:
    image: mysql:8.0
    container_name: pc_mysql
    env_file:
      - ./backend/.env
    environment:
      MYSQL_DATABASE: perspectiveconnect
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - pc_mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    image: pc_backend:latest
    container_name: pc_backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/app/storage:/app/app/storage
    depends_on:
      mysql:
        condition: service_healthy
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://pc.appfounder.ca/api}
    image: pc_frontend:latest
    container_name: pc_frontend
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://pc.appfounder.ca/api}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  pc_mysql_data:
